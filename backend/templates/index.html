<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Todo List API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <main class="container py-5">
      <h1 class="mb-4">Todo List API</h1>
      <ul class="list-group">
        <li class="list-group-item">POST /api/register</li>
        <li class="list-group-item">POST /api/login</li>
        <li class="list-group-item">GET /api/board</li>
        <li class="list-group-item">POST /api/tasks</li>
        <li class="list-group-item">PATCH /api/tasks/&lt;id&gt;</li>
        <li class="list-group-item">DELETE /api/tasks/&lt;id&gt;</li>
      </ul>
    </main>
  </body>
</html>
